services:
  mysql:
    image: mysql:8.0
    command:
      - --mysqlx=ON
      - --mysqlx-port=33060
      - --mysqlx-bind-address=0.0.0.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
    ports:
      - "33060:33060"
      - "3306:3306"
    volumes:
      - ./tests/e2e/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 3s
      timeout: 5s
      retries: 20
